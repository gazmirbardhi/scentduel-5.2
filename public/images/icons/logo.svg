<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <!-- Amber gradient for the bottle -->
    <linearGradient id="bottleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c9a86a"/>
      <stop offset="50%" stop-color="#a67c45"/>
      <stop offset="100%" stop-color="#6b4a2b"/>
    </linearGradient>
    <!-- Gold accent -->
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8d5a3"/>
      <stop offset="100%" stop-color="#c9a86a"/>
    </linearGradient>
    <!-- Scent trail gradient -->
    <linearGradient id="trailGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c9a86a" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#c9a86a" stop-opacity="0"/>
    </linearGradient>
    <!-- Dark rounded background -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a1f14"/>
      <stop offset="100%" stop-color="#1a130a"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)"/>

  <!-- Scent trail (abstract wavy lines evoking vapor) -->
  <g opacity="0.5" fill="none" stroke="url(#trailGrad)" stroke-width="3" stroke-linecap="round">
    <path d="M 300 180 Q 340 150, 360 120 Q 380 90, 360 70"/>
    <path d="M 320 190 Q 370 170, 395 140 Q 420 110, 410 85" opacity="0.7"/>
    <path d="M 280 175 Q 310 140, 320 105 Q 325 75, 305 55" opacity="0.5"/>
  </g>

  <!-- Atomizer/cap -->
  <rect x="236" y="120" width="40" height="28" rx="3" fill="url(#goldGrad)"/>
  <rect x="244" y="100" width="24" height="22" rx="2" fill="url(#goldGrad)"/>
  <!-- Neck -->
  <rect x="246" y="148" width="20" height="20" fill="#4a3520"/>

  <!-- Bottle body (flask silhouette with shoulders) -->
  <path d="
    M 196 168
    Q 196 190, 216 205
    L 216 372
    Q 216 402, 256 402
    L 256 402
    Q 296 402, 296 372
    L 296 205
    Q 316 190, 316 168
    Z
  " fill="url(#bottleGrad)" stroke="url(#goldGrad)" stroke-width="2.5"/>

  <!-- Bottle highlight (glass reflection) -->
  <path d="M 228 215 L 228 370 Q 228 378, 236 378" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="6" stroke-linecap="round"/>

  <!-- "SD" monogram on the bottle -->
  <text x="256" y="310" font-family="Georgia, 'Times New Roman', serif" font-size="62" font-weight="bold" fill="rgba(255,240,210,0.9)" text-anchor="middle" letter-spacing="-2">SD</text>

  <!-- Small label line under monogram -->
  <rect x="226" y="328" width="60" height="1.5" fill="rgba(255,240,210,0.4)"/>
</svg>
